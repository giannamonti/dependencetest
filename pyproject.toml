dynamic = ["dependencies"]
requires-python = "^3.12"

[tool.poetry]
requires-poetry = ">=2.0"
packages = [{ include = "*", from = "inst/python/src" }]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
res = ["inst/python/resources/*", "inst/python/resources/*/*"]

[project.scripts]
main = "dve.cli:main"
hello = "dve.scripts.dummy.dummy_script:main"

